name: Tear Down

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  tear-down:
    name: Tear down staged stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify merged pull request trigger
        id: merged-pr-check
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
            echo "is_eligible=false" >> "$GITHUB_OUTPUT"
            echo "[tear-down] Pull request was closed without merge. Skipping."
            exit 0
          fi

          echo "is_eligible=true" >> "$GITHUB_OUTPUT"

      - name: Verify pull request approval exists
        id: review-check
        if: github.event_name == 'pull_request' && steps.merged-pr-check.outputs.is_eligible == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const hasApproval = reviews.some((review) => review.state === "APPROVED");

            core.setOutput("has_approval", hasApproval ? "true" : "false");

            if (!hasApproval) {
              core.info("[tear-down] Pull request was merged without a recorded approval review. Skipping.");
            }

      - name: Run teardown
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && steps.merged-pr-check.outputs.is_eligible == 'true' && steps.review-check.outputs.has_approval == 'true')
        shell: bash
        run: bash .github/scripts/tear-down-stage.sh
