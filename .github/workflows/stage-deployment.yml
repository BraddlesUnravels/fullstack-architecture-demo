name: Stage Production Deplyment

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:
  stage-deployment:
    name: Validate production stack

    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'test')

    runs-on: ubuntu-latest
    environment: test

    env:
      API_HOST: ${{ vars.API_HOST }}
      API_URL: http://api:4000
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      PORT: 4000

      POSTGRES_DB: app_db
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      REDIS_URL: redis://redis:6379

      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create app-network

      - name: Start Postgres
        uses: ./.github/actions/postgres

      - name: Start Redis
        uses: ./.github/actions/redis

      - name: Build and start API
        uses: ./.github/actions/api

      - name: Build and start UI
        uses: ./.github/actions/ui

      - name: Verify stack
        shell: bash
        run: |
          curl --fail --retry 10 --retry-delay 3 --retry-all-errors \
            http://localhost:4000/health

          curl --fail --retry 10 --retry-delay 3 --retry-all-errors \
            http://localhost:3000

      - name: Print container diagnostics
        if: failure()
        shell: bash
        run: |
          docker ps --all
          docker logs app_postgres --tail 300 || true
          docker logs app_redis --tail 300 || true
          docker logs app_api --tail 300 || true
          docker logs app_ui --tail 300 || true

      - name: Print successful API container status
        if: success()
        shell: bash
        run: |
          docker ps \
            --all \
            --filter "name=app_api" \
            --format 'table {{.ID}}\t{{.Names}}\t{{.Status}}'
