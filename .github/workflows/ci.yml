name: CI

on:
  pull_request:
    branches: ['main']

jobs:
  quality-checks:
    name: Format, typecheck, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck workspaces
        run: bun run --filter '@app/*' typecheck

      - name: Lint code
        run: bun run lint

      - name: Run API tests
        run: bun run --filter '@app/api' test
