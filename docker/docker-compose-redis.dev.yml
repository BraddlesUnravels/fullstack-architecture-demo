services:
  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped

    env_file:
      - ../.env

    command:
      - sh
      - -c
      - |
        test -n "$$REDIS_PASSWORD" || {
          echo "REDIS_PASSWORD is required"
          exit 1
        }

        exec redis-server \
          --appendonly no \
          --requirepass "$$REDIS_PASSWORD"

    ports:
      - '127.0.0.1:6379:6379'

    healthcheck:
      test:
        - CMD-SHELL
        - 'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping'
      interval: 5s
      timeout: 3s
      retries: 10
